services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
      - meilisearch

  backend-worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    command: ["php", "artisan", "queue:work", "--queue=default", "--sleep=1", "--tries=3", "--timeout=120"]
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
      - meilisearch

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: peetyai
      MYSQL_USER: peetyai
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.13
    environment:
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  mysql_data:
  meili_data:
